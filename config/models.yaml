providers:
  ollama:
    base_url: "http://localhost:11434/v1"
    api_key: "ollama"
  openrouter:
    base_url: "https://openrouter.ai/api/v1"
    api_key_env: "OPENROUTER_API_KEY"

# Sensitivity gate: keyed on DATA signals present in the input text, not on
# task topic. A prompt is force-localed only if it contains a term below —
# discussing PKI/crypto as a technical topic never triggers this on its own.
sensitive_classes:
  customer_data:
    - "customer"
    - "client"
  rfp_content:
    - "rfp"
    - "rfi"
    - "tender"
  account_info:
    - "account"
    - "acct #"
    # add literal known customer/account names below, matched case-insensitively
  pricing:
    - "pricing"
    - "price list"
    - "quote"
    - "rate card"

task_models:
  router:
    primary: "ollama/gemma4:e4b"

  email_draft:
    cloud_chain:
      - "openrouter/z-ai/glm-5.2"
    fallback_chain:
      - "ollama/qwen3:30b"
    thinking_mode: false

  email_send:
    cloud_chain: []
    fallback_chain:
      - "ollama/qwen3:30b"
    thinking_mode: false

  meeting_summary:
    cloud_chain:
      - "openrouter/z-ai/glm-5.2"
    fallback_chain:
      - "ollama/qwen3:30b"
    thinking_mode: false

  rfp_analysis:
    cloud_chain:
      - "openrouter/z-ai/glm-5.2"
    fallback_chain:
      - "ollama/qwen3:30b"
    thinking_mode: true

  pki_qa:
    cloud_chain:
      - "openrouter/z-ai/glm-5.2"
    fallback_chain:
      - "ollama/qwen3:30b"
    thinking_mode: false

  research:
    cloud_chain:
      - "openrouter/z-ai/glm-5.2"
    fallback_chain:
      - "ollama/qwen3:30b"
    thinking_mode: false

  general:
    cloud_chain:
      - "openrouter/z-ai/glm-5.2"
    fallback_chain:
      - "ollama/qwen3:30b"
    thinking_mode: false

  benchmark:
